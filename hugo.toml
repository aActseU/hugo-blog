baseURL = 'http://13.212.22.21/'
languageCode = 'zh-cn'
title = 'NEWTONKING'
theme = 'hextra'

# 开启中日韩语言支持
hasCJKLanguage = true

#  Git 信息解析
# enableGitInfo = true

[markup.goldmark.renderer]
unsafe = true

[markup.goldmark.extensions.passthrough]
  enable = true
  [markup.goldmark.extensions.passthrough.delimiters]
    # 段落（块级）公式支持 \[ \] 和 $$ $$
    block = [['\[', '\]'], ['$$', '$$']]
    # 行内公式支持官方的 \( \) 以及你习惯使用的 $ $
    inline = [['\(', '\)'], ['$', '$']]

[markup.highlight]
noClasses = false

[[menu.main]]
  name = "文章"
  pageRef = "/posts"
  weight = 1

[[menu.main]]
  name = "关于"
  pageRef = "/about" 
  weight = 2

[[menu.main]]
  name = "标签"
  pageRef = "/tags"
  weight = 3

[[menu.main]]
  name = ""
  weight = 4
  params = { type = "search"}

[params.search]
  enable = true
  type = "flexsearch"

[params.blog.list]
  displayTags = true